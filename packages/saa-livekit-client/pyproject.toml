[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "saa-livekit-client"
version = "0.3.2"
description = "LiveKit Agents client for SAA, the addressee layer for voice agents — gates your LiveKit voice agent to respond only to speech directed at it."
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [
    { name = "Attention Labs" },
]
readme = "README.md"
keywords = ["livekit","livekit-agents","voice-agents","voice-ai","addressee-detection","device-directed-speech","turn-detection","vad","conversational-ai","selective-auditory-attention","real-time"]
classifiers = [
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "livekit>=1.0",
    "livekit-api>=1.0",
    "livekit-agents>=1.0",
    "httpx>=0.25",
]

[project.urls]
Homepage = "https://attentionlabs.ai"
Source = "https://github.com/attenlabs/saa-sdk"
Issues = "https://github.com/attenlabs/saa-sdk/issues"
Documentation = "https://attentionlabs.ai/docs/integrations/livekit"

[tool.setuptools]
packages = ["saa_livekit_client"]

[tool.setuptools.package-dir]
saa_livekit_client = "."
