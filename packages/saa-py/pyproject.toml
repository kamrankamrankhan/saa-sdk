[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "attenlabs-saa"
version = "0.7.0"
description = "Python SDK for SAA, the addressee layer for voice agents — device-directed speech detection that emits a turn_ready event per addressed utterance, so only speech meant for your agent reaches your STT, LLM, or TTS."
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.10"
authors = [
    { name = "Attention Labs" },
]
keywords = ["voice-agents","voice-ai","addressee-detection","device-directed-speech","selective-auditory-attention","turn-detection","speech-recognition","vad","wake-word","conversational-ai","real-time","llm","stt","python","microphone"]
classifiers = [
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "numpy>=1.24",
    "websocket-client>=1.6",
    "sounddevice>=0.4.6",
    "opencv-python>=4.8",
]

[project.urls]
Homepage = "https://attentionlabs.ai"
Source = "https://github.com/attenlabs/saa-sdk"
Issues = "https://github.com/attenlabs/saa-sdk/issues"
Documentation = "https://github.com/attenlabs/saa-sdk/tree/main/packages/saa-py"
Changelog = "https://github.com/attenlabs/saa-sdk/blob/main/CHANGELOG.md"

[tool.hatch.build.targets.wheel]
packages = ["src/saa"]

[tool.hatch.build.targets.sdist]
include = [
    "src/saa",
    "README.md",
    "LICENSE",
    "pyproject.toml",
]
