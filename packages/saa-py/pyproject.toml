[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "attenlabs-saa"
version = "0.6.1"
description = "Python SDK for SAA, Attention Labs' device-directed speech detection."
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.10"
authors = [
    { name = "Attention Labs" },
]
keywords = ["attention", "saa", "audio", "video", "vad", "realtime", "websocket"]
classifiers = [
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "numpy>=1.24",
    "websocket-client>=1.6",
    "sounddevice>=0.4.6",
    "opencv-python>=4.8",
]

[project.urls]
Homepage = "https://attentionlabs.ai"
Source = "https://github.com/attenlabs/saa-sdk"
Issues = "https://github.com/attenlabs/saa-sdk/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/saa"]

[tool.hatch.build.targets.sdist]
include = [
    "src/saa",
    "README.md",
    "LICENSE",
    "pyproject.toml",
]
