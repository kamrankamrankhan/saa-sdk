[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "saa-pipecat-client"
version = "0.3.1"
description = "Pipecat / Daily client for saa: consume attention events inside your voice agent."
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [
    { name = "Attention Labs" },
]
readme = "README.md"
keywords = ["pipecat", "daily", "voice-agent", "attention", "vad", "turn-detection"]
dependencies = [
    "pipecat-ai[daily]>=1.0.0,<2",
    "daily-python>=0.19.0,<1",
    "httpx>=0.25",
]

[project.urls]
Homepage = "https://attentionlabs.ai"
Source = "https://github.com/attenlabs/saa-sdk"
Issues = "https://github.com/attenlabs/saa-sdk/issues"
Documentation = "https://attentionlabs.ai/docs/integrations/pipecat"

[tool.setuptools]
packages = ["saa_pipecat_client"]

[tool.setuptools.package-dir]
saa_pipecat_client = "."
